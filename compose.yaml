services:
  backend:
    build: .
    container_name: backend
    env_file: ./.env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17.9
    container_name: postgres
    env_file: ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8.6.2
    container_name: redis
    volumes:
      - ./redis.conf:/redis/config/redis.conf # o arquivo local será mapeado para esse arquivo do container
      - redis_data:/redis/data/
      - redis_log:/redis/log/
    command: >
      bash -c "chown -R 999:999 /redis/data/ /redis/log/ &&
      redis-server /redis/config/redis.conf"

volumes:
  postgres_data:
  redis_data:
  redis_log:



# Portas no Docker são no formato host:container, respectivamente
# a porta que o sistema utiliza na máquina que o roda e a porta
# em que ele deve aceitar fluxo.


# 999 é o user do Redis na imagem oficial.


